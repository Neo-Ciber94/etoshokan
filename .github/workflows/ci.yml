name: CI

on:
  workflow_dispatch:
  push:

permissions:
  contents: write # FIXME: Only the release action need this

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Build the project
  build:
    runs-on: ubuntu-latest
    outputs:
      android-changes: ${{ steps.changes.outputs.android-changes }}
    steps:
      - name: Setup repo
        uses: actions/checkout@v6

      # Bun
      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version-file: '.bun-version'

      - name: Install JS deps
        run: bun install

      # Build
      - name: Build App
        env:
          BETTER_AUTH_URL: http://localhost:5173
          BETTER_AUTH_SECRET: this_is_for_test_the_build_is_safe
        run: bun run build

      - uses: dorny/paths-filter@v3
        id: changes
        with:
          filters: |
            android-changes:
              - 'src-tauri/**'

  # Build the android app, this should be optional
  android:
    if: >
      (github.ref == 'refs/heads/main' && needs.build.outputs.android-changes == 'true')
      || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    needs: [build]
    steps:
      - name: Setup repo
        uses: actions/checkout@v6

      # Bun
      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version-file: '.bun-version'

      - name: Install JS deps
        run: bun install

      # Java (Temurin 17)
      - name: Setup JDK 17
        id: java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Export JAVA_HOME
        run: echo "JAVA_HOME=${{ steps.java.outputs.path }}" >> $GITHUB_ENV

      # Cache Android SDK
      - name: Cache Android SDK
        uses: actions/cache@v4
        with:
          path: android-sdk
          key: android-sdk-28-v1

      # Install Android SDK
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK components
        run: |
          sdkmanager --sdk_root=${ANDROID_HOME} "platform-tools"
          sdkmanager --sdk_root=${ANDROID_HOME} "platforms;android-28"
          sdkmanager --sdk_root=${ANDROID_HOME} "build-tools;28.0.3"
          sdkmanager --sdk_root=${ANDROID_HOME} "ndk;25.2.9519653"
          yes | sdkmanager --sdk_root=${ANDROID_HOME} --licenses

      - name: Export NDK_HOME
        run: |
          NDK_DIR=$(ls -1 $ANDROID_HOME/ndk | head -n 1)
          echo "NDK_HOME=$ANDROID_HOME/ndk/$NDK_DIR" >> $GITHUB_ENV

      # Cache Gradle
      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}

      # Cache Cargo
      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: cargo-${{ runner.os }}-${{ hashFiles('**/Cargo.lock') }}

      # Rust with ALL required Android targets
      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android

      # Build Android
      # - name: Build Android (Debug)
      #   run: bun run build:android-debug

      - name: setup Android signing
        run: |
          cd src-tauri/gen/android
          echo "keyAlias=${{ secrets.ANDROID_KEY_ALIAS }}" > keystore.properties
          echo "password=${{ secrets.ANDROID_KEY_PASSWORD }}" >> keystore.properties
          base64 -d <<< "${{ secrets.ANDROID_KEY_BASE64 }}" > $RUNNER_TEMP/keystore.jks
          echo "storeFile=$RUNNER_TEMP/keystore.jks" >> keystore.properties

      # Setup apk version
      - name: Generate apk version
        id: apk-version
        run: node ./scripts/prepare-version.js

      # Build Android
      - name: Build Android (Release)
        run: bun run build:android

      # Move apk
      - name: Rename apk
        id: prepare-apk
        env:
          APK_VERSION: ${{ steps.apk-version.outputs.version }}
        run: node ./scripts/prepare-apk.js

      # Upload apk
      - uses: actions/upload-artifact@v4
        with:
          name: etoshokan-apk
          path: ${{ steps.prepare-apk.outputs.apk-path }}

      - name: Create Release
        env:
          GH_TOKEN: ${{ github.token }}
          VERSION: ${{ steps.prepare-apk.outputs.apk-version }}
          APK_PATH: ${{ steps.prepare-apk.outputs.apk-path }}
        run: |
          NOTES="Released at $(date -u '+%Y-%m-%d %H:%M:%S') UTC"
          gh release create "$VERSION" --title "$VERSION" --notes "$NOTES" "$APK_PATH"
